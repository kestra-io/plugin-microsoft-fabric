<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="150" height="150">
  <defs>
    <linearGradient id="fabricGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#50E6FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fabricGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#773ADC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Fabric "woven" pattern representing Microsoft Fabric -->
  <rect x="5" y="5" width="90" height="90" rx="12" ry="12" fill="url(#fabricGrad1)"/>
  <!-- Horizontal strands -->
  <rect x="15" y="25" width="70" height="10" rx="5" fill="white" opacity="0.9"/>
  <rect x="15" y="45" width="70" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="15" y="65" width="70" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- Vertical strand overlay representing weave -->
  <rect x="35" y="15" width="10" height="70" rx="5" fill="url(#fabricGrad2)" opacity="0.7"/>
  <rect x="55" y="15" width="10" height="70" rx="5" fill="url(#fabricGrad2)" opacity="0.5"/>
</svg>
